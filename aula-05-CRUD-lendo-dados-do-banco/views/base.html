<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- importando css -->
    <link
      rel="stylesheet"
      href="{{url_for('static', filename='css/styles.css')}}"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <img src="{{url_for('static', filename='imgs/thegames_logo.png')}}" alt="Logo" width="300px" />
    </header>

    <!-- navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{url_for('home')}}">The Games</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{{url_for('home')}}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{{url_for('games')}}"
                >Games</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{url_for('consoles')}}">Consoles</a>
            </li>

             <li class="nav-item">
              <a class="nav-link" href="{{url_for('cadgames')}}">Cadastrar Jogo</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{url_for('estoque_jogos')}}">Estoque de Jogos</a>
            </li>
            
          </ul>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>
        </div>
      </div>
    </nav>

    <!-- aqui irá o conteúdo das outras páginas -->
    {% block content %} {% endblock content %}
    <footer>
      <hr />
      <p style="text-align: center">
        &copy; 2026 - The Games - Todos os direitos reservados.
      </p>
    </footer>
  </body>
</html>
