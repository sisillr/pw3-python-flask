{% extends 'base.html' %}

{% block content %}
<h2>Cadastro de Jogos</h2>
<hr />

<form action="{{ url_for('cadgames') }}" method="POST">
  <label>Título</label>
  <input
    type="text"
    name="titulo"
    placeholder="Insira o nome do jogo"
    class="form-control"
    required
  />

  <label>Ano</label>
  <input
    type="number"
    name="ano"
    placeholder="Insira o ano do jogo"
    class="form-control"
    required
  />

  <label>Categoria</label>
  <input
    type="text"
    name="categoria"
    placeholder="Insira a categoria do jogo"
    class="form-control"
    required
  />

  <input type="submit" value="Cadastrar" class="btn btn-success" />
  <input type="reset" value="Limpar" class="btn btn-danger" />
</form>

<br />
<hr />

<h4>Jogos cadastrados:</h4>
<table class="table table-bordered table-hover">
  <thead class="table-dark">
    <tr>
      <th>Título</th>
      <th>Ano</th>
      <th>Categoria</th>
    </tr>
  </thead>

  <tbody>
    {% for game in listaGames %}
    <tr>
      <td>{{ game.titulo }}</td>
      <td>{{ game.ano }}</td>
      <td>{{ game.categoria }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock content %}
