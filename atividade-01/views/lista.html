<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laufey</title>

    <style>
        body {
            background-color: #1e1a8b;
            text-align: center;
            font-family: Garamond, serif;
        }

        h1 {
            color: #e6e8f4;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }

        .card {
            background-color: #e6e8f4;
            width: 200px;
            padding: 15px;
            border-radius: 10px;
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        .card p {
            margin-top: 10px;
            font-weight: bold;
            color: #1e1a8b;
        }
    </style>
</head>
<body>
    <h1>Músicas Populares</h1>
    <hr>

    <div class="container">
        <div class="card">
          
            <p>From The Start</p>
        </div>

        <div class="card">
            
            <p>Falling Behind</p>
        </div>

        <div class="card">
            
            <p>Let You Break My Heart Again</p>
        </div>
    </div>
</body>
</html>
