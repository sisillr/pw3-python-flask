<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laufey</title>

    <style> body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    background: linear-gradient(to bottom, #131242, #1e1a8b);
    font-family: Garamond, serif;
    color: #c3c1ff;
    text-align: center;
    padding-top: 0px;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 0px;
    
}

hr {
    width: 60%;
    margin-top: 20px;
    border: 1px solid #c3c1ff;
    opacity: 0.5;
}

form {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
}

label {
    font-size: 1rem;
    font-weight: bold;
    text-align: left;
    color: #1e1a8b;
}

input,
textarea {
    padding: 10px;
    border: 1px solid #1e1a8b;
    border-radius: 13px;
    font-family: Garamond, serif;
    font-size: 1rem;
    color: #1e1a8b;
    background-color: #c3c1ff;
}

input::placeholder,
textarea::placeholder {
    color: #78779e;
    opacity: 0.8;
}

button {
    padding: 10px;
    background-color: #1e1a8b;
    color: white;
    border: none;
    border-radius: 5px;
    font-family: Garamond, serif;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: #151266;
}

    </style>

</head>
<body>
    <h1>Laufey</h1>
    <br> 
    <form> 
        <label for="nome">Nome:</label> 
        <input type="text" id="nome" placeholder="Digite seu nome"> 
        <label for="email">E-mail:</label> 
        <input type="email" id="email" placeholder="Digite seu e-mail"> 
        <!-- Aqui estava a mensagem -->
        <label for="telefone">Telefone:</label> 
        <textarea id="telefone" rows="4" placeholder="Digite seu telefone"></textarea> 
        <button type="submit">Enviar</button> 
    </form>
    
</body>
</html>
