<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laufey</title>

    <style> body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    background: linear-gradient(to bottom, #1e1a8b, #ffffff);
    font-family: Garamond, serif;
    color: #1e1a8b;
    text-align: center;
    padding-top: 40px;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

hr {
    width: 60%;
    margin-top: 20px;
    border: 1px solid #1e1a8b;
    opacity: 0.5;
}

form {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
}

label {
    font-size: 1rem;
    font-weight: bold;
    text-align: left;
    color: #1e1a8b;
}

input,
textarea {
    padding: 10px;
    border: 1px solid #1e1a8b;
    border-radius: 5px;
    font-family: Garamond, serif;
    font-size: 1rem;
    color: #1e1a8b;
    background-color: #ffffff;
}

input::placeholder,
textarea::placeholder {
    color: #666666;
    opacity: 0.8;
}

button {
    padding: 10px;
    background-color: #1e1a8b;
    color: white;
    border: none;
    border-radius: 5px;
    font-family: Garamond, serif;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: #151266;
}

    </style>

</head>
<body>
    <h1>Formulário</h1>
    <hr> 
    <form> 
        <label for="nome">Nome:</label> 
        <input type="text" id="nome" placeholder="Digite seu nome"> 
        <label for="email">E-mail:</label> 
        <input type="email" id="email" placeholder="Digite seu e-mail"> 
        <label for="mensagem">Mensagem:</label> 
        <textarea id="mensagem" rows="4" placeholder="Digite sua mensagem"></textarea> 
        <button type="submit">Enviar</button> 
    </form>
    
</body>
</html>
